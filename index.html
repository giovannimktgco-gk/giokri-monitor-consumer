<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>GioKri Monitor</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<div class="container">

<h1>GioKri Monitor</h1>

<div id="auth-box">

<h2>Registrazione</h2>

<input type="email" id="reg-email" placeholder="Email">
<input type="password" id="reg-password" placeholder="Password">

<button onclick="registerUser()">
Registrati
</button>

<hr>

<h2>Login</h2>

<input type="email" id="log-email" placeholder="Email">
<input type="password" id="log-password" placeholder="Password">

<button onclick="loginUser()">
Accedi
</button>

</div>

<div id="app" style="display:none;">
<div class="dashboard">

<div class="kpi-card">
<h3>Spesa Totale</h3>
<div id="kpi-spesa">€ 0</div>
</div>

<div class="kpi-card">
<h3>Consumi Totali</h3>
<div id="kpi-consumi">0</div>
</div>

<div class="kpi-card">
<h3>Costo Medio</h3>
<div id="kpi-media">€ 0</div>
</div>

</div>

<div class="chart-container">
<canvas id="graficoSpesa"></canvas>
</div>

<div class="topbar">
<span id="utente-email"></span>

<button onclick="logoutUser()">
Esci
</button>
</div>

<h2>Nuova Bolletta</h2>

<select id="tipo">
<option value="Luce">💡 Luce</option>
<option value="Gas">🔥 Gas</option>
</select>

<label>Periodo DAL</label>
<input type="date" id="periodo_dal">

<label>Periodo AL</label>
<input type="date" id="periodo_al">

<label>Consumi</label>
<input type="number" id="consumi" placeholder="Consumi">

<label>Importo totale</label>
<input type="number" id="importo" placeholder="Importo totale">

<label>Tariffa €/kWh o €/Smc</label>
<input type="number" id="tariffa" placeholder="Tariffa" step="0.0001">

<label>Quota fissa</label>
<input type="number" id="quota" placeholder="Quota fissa">

<label>Fornitore</label>
<input type="text" id="fornitore" placeholder="Es. Enel Energia">

<label>Mercato</label>
<select id="mercato">
<option value="Libero">Libero</option>
<option value="Tutele Graduali">Tutele Graduali</option>
<option value="Tutela">Tutela</option>
</select>

<label>POD / PDR</label>
<input type="text" id="pod_pdr" placeholder="Codice POD o PDR">

<label>Note</label>
<input type="text" id="note" placeholder="Note opzionali">

<button onclick="salvaBolletta()">
Salva bolletta
</button>
</button>

<h2>Storico</h2>

<div id="storico"></div>

</div>

</div>

<script src="supabase-config.js"></script>
<script src="app.js"></script>

</body>
</html>
