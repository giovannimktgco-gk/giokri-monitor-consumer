<!-- ====================== -->
<!-- FORM NUOVA BOLLETTA -->
<!-- SOSTITUISCI SOLO LA PARTE FORM -->
<!-- ====================== -->

<div class="box">

  <h2>
    Nuova Bolletta
  </h2>

  <!-- TIPO -->

  <label>
    Tipo
  </label>

  <select id="tipo">

    <option value="LUCE">
      Luce
    </option>

    <option value="GAS">
      Gas
    </option>

  </select>

  <!-- DATE -->

  <label>
    Periodo DAL
  </label>

  <input
    type="date"
    id="periodo_dal"
  >

  <label>
    Periodo AL
  </label>

  <input
    type="date"
    id="periodo_al"
  >

  <!-- CONSUMI -->

  <label>
    Consumi
  </label>

  <input
    type="number"
    id="consumi"
    placeholder="Consumi"
  >

  <!-- IMPORTO -->

  <label>
    Importo totale
  </label>

  <input
    type="number"
    step="0.01"
    id="importo"
    placeholder="Importo totale"
  >

  <!-- TARIFFA -->

  <label>
    Tariffa €/kWh o €/Smc
  </label>

  <input
    type="number"
    step="0.0001"
    id="tariffa"
    placeholder="Tariffa"
  >

  <!-- 🔥 NUOVO CAMPO -->

  <label>
    Tipo Tariffa
  </label>

  <select id="tariffa_tipo">

    <option value="">
      Seleziona
    </option>

    <option value="FISSA">
      Fissa
    </option>

    <option value="INDICIZZATA">
      Indicizzata
    </option>

  </select>

  <!-- QUOTA -->

  <label>
    Quota fissa
  </label>

  <input
    type="number"
    step="0.01"
    id="quota"
    placeholder="Quota fissa"
  >

  <!-- FORNITORE -->

  <label>
    Fornitore
  </label>

  <input
    type="text"
    id="fornitore"
    placeholder="Es. Enel Energia"
  >

  <!-- MERCATO -->

  <label>
    Mercato
  </label>

  <select id="mercato">

    <option value="LIBERO">
      Libero
    </option>

    <option value="TUTELATO">
      Tutelato
    </option>

  </select>

  <!-- POD -->

  <label>
    POD / PDR
  </label>

  <input
    type="text"
    id="pod_pdr"
    placeholder="Codice POD o PDR"
  >

  <!-- NOTE -->

  <label>
    Note
  </label>

  <textarea
    id="note"
    placeholder="Note opzionali"
  ></textarea>

  <!-- SAVE -->

  <button onclick="salvaBolletta()">
    Salva bolletta
  </button>

</div>
